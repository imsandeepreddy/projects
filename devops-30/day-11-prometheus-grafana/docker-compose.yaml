services:
  app:
    build: .
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/flask_db
    ports:
      - "5000:5000"
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=flask_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

  proxy:
    image: nginx:alpine
    volumes: 
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - app

  node-exporter:
    image: prom/node-exporter:v1.6.1
    expose:
      - "9100"

  prometheus:
    image: prom/prometheus:v2.45.0
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - app
      - node-exporter

  grafana:
    image: grafana/grafana:10.0.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      # Data source auto-provisioning
      - ./grafana-datasource.yaml:/etc/grafana/provisioning/datasources/datasource.yml
      # PERSISTENT STORAGE: Keeps dashboards safe across container destructions
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  grafana_data: # Declaring the persistent storage volume for Grafana
