services:
  app:
    build: .
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/flask_db
    expose:
      - "5000"
    depends_on:
      - db
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=flask_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
  proxy:
    image: nginx:alpine
    volumes: 
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - app
volumes:
  postgres_data: